<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raaga's Job Monitor</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:16px;padding:48px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:480px}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:22px;color:#1e293b;margin-bottom:8px}
p{color:#64748b;font-size:15px;line-height:1.6}
.badge{display:inline-block;background:#4f46e5;color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">⚡</div>
  <h1>Job Monitor is Setting Up</h1>
  <p>The GitHub Actions workflow will run shortly and populate this dashboard with your personalized job listings.</p>
  <p style="margin-top:12px">Trigger the workflow manually from the <strong>Actions</strong> tab in your repo to see results immediately.</p>
  <div class="badge">Auto-refreshes every 2 hours</div>
</div>
</body>
</html>
